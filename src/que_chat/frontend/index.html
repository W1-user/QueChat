<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>QueChat</title>
</head>
<body>

    <div class="banner_character">
        <div class="channel_avatar"></div>
        <div class="channel_title"></div>
        <div class="username_container">
            <input type="text" id="usernameInput" placeholder="Введите свой Юзернейм...">
            <button class="send_username" id="sendUsername"></button>
        </div>
    </div>

    <div class="message_history" id="messageHistory">
        <!-- All message -->
    </div>

    <div class="chat_input_arena">
        <div class="input_arena">
            <input type="text" id="messageInput" placeholder="Напишите сообщение...">
            <button class="send_message" id="sendBtn"></button>
        </div>
    </div>

    <script src="script.js"></script>

</body>
</html>
